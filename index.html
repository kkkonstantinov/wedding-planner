<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misha & Nastya · Big Day & Beyond</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { 
    background: #faf8f5; 
    color: #3d2f2b; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  
  .password-screen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #faf8f5;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  
  .password-screen.hidden {
    display: none;
  }
  
  .password-container {
    background: #ffffff;
    border-radius: 20px;
    padding: 60px 40px;
    box-shadow: 0 8px 24px rgba(244, 168, 149, 0.12);
    max-width: 420px;
    width: 90%;
    text-align: center;
  }
  
  .heart { font-size: 48px; margin-bottom: 15px; display: block; }
  h1 { font-size: 32px; font-weight: 300; color: #f4a895; margin-bottom: 10px; letter-spacing: 1px; }
  .subtitle { font-size: 14px; color: #6b5a52; margin-bottom: 30px; }
  
  .password-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  
  input[type="password"] {
    padding: 14px 16px;
    border: 2px solid #e8dfd8;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    transition: all 0.3s;
  }
  
  input[type="password"]:focus {
    outline: none;
    border-color: #f4a895;
    box-shadow: 0 0 0 3px rgba(244, 168, 149, 0.1);
  }
  
  button {
    padding: 14px 24px;
    background: #f4a895;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  button:hover {
    background: #ffa07a;
    transform: translateY(-2px);
  }
  
  .error { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }
  .error.show { display: block; }
  .info { font-size: 12px; color: #6b5a52; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e8dfd8; }
  
  #main-content { display: none; }
  #main-content.visible { display: block; }
</style>
</head>
<body>

<div class="password-screen" id="password-screen">
  <div class="password-container">
    <div class="password-header">
      <span class="heart">💕</span>
      <h1>Misha & Nastya</h1>
      <p class="subtitle">Big Day & Beyond</p>
    </div>
    
    <form class="password-form" id="password-form">
      <input type="password" id="password-input" placeholder="Введи пароль..." autocomplete="off" required>
      <button type="submit">🔓 Открыть планер</button>
      <div class="error" id="error-msg">❌ Неправильный пароль</div>
    </form>
    
    <div class="info">💡 Защита паролем включена</div>
  </div>
</div>

<div id="main-content"></div>

<script>
  const PASSWORD = "awx2kdh8QWD6rjk!whg";
  
  function unlockContent() {
    document.getElementById('password-screen').classList.add('hidden');
    document.getElementById('main-content').classList.add('visible');
  }
  
  function checkPassword() {
    const saved = localStorage.getItem('wedding_auth');
    if (saved === PASSWORD) {
      unlockContent();
    }
  }
  
  document.getElementById('password-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const password = document.getElementById('password-input').value;
    
    if (password === PASSWORD) {
      localStorage.setItem('wedding_auth', PASSWORD);
      setTimeout(() => unlockContent(), 300);
    } else {
      document.getElementById('error-msg').classList.add('show');
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  });
  
  document.getElementById('password-input').focus();
  checkPassword();
</script>

</body>
</html>
